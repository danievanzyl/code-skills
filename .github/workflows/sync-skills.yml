name: sync-skills

# Weekly vendor of external skill providers into skills/vendor/** (configured in
# scripts/skill-sources.json). Opens or updates ONE PR per run — it never pushes
# to main directly, because every push to main auto-bumps the version and cuts a
# release (see release.yml). Merging the PR is the human push that triggers that
# release as normal. No commit message here carries [skip ci].

on:
  schedule:
    - cron: "17 6 * * 1"   # Mondays 06:17 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: sync-skills
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync vendored skills
        run: bash scripts/sync-skills.sh

      - name: Open or update PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "$(git status --porcelain)" ]; then
            echo "No upstream changes — nothing to sync."
            exit 0
          fi

          BR=chore/sync-skills
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Rebuild the branch from the current main HEAD each run: one clean
          # sync commit, force-pushed. An open PR for $BR updates in place.
          git checkout -B "$BR"
          git add -A
          git commit -m "chore: sync vendored skills from upstream providers"
          git push -f origin "$BR"

          if gh pr view "$BR" --json state --jq '.state' 2>/dev/null | grep -q '^OPEN$'; then
            echo "Updated existing PR for $BR."
          else
            gh pr create --base main --head "$BR" \
              --title "chore: sync vendored skills" \
              --body $'Automated sync of vendored skills from `scripts/skill-sources.json`, regenerated by `scripts/sync-skills.sh`.\n\nVendored skills land flat in `skills/<name>/` (each with a `.vendored-from` marker); attribution + the synced upstream commit are in `vendor/<provider>/`. Review those diffs.\n\nMerging cuts a normal release (version bump via `release.yml`).'
          fi
